<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navigation Menu Builder - SmartCounter Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Fira+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-0: #0c0c0c;
      --bg-1: #141414;
      --bg-2: #1e1e1e;
      --bg-3: #282828;
      --bg-4: #333;
      --text-0: #f0f0f0;
      --text-1: #b0b0b0;
      --text-2: #777;
      --border: #2a2a2a;
      --accent: #DC2626;
      --green: #22c55e;
      --amber: #f59e0b;
    }

    body {
      font-family: 'Fira Sans', sans-serif;
      background-color: var(--bg-0);
      color: var(--text-0);
      height: 100vh;
      overflow: hidden;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 280px;
      background-color: var(--bg-1);
      border-right: 1px solid var(--border);
      padding: 24px 16px;
      overflow-y: auto;
    }

    .sidebar-header {
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sidebar-logo {
      width: 32px;
      height: 32px;
      background-color: var(--accent);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 12px;
      color: white;
      font-family: 'Fira Code', monospace;
    }

    .sidebar-brand {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-0);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .sidebar-section {
      margin-bottom: 24px;
    }

    .sidebar-section-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
      padding: 0 12px;
    }

    .sidebar-item {
      padding: 10px 12px;
      margin-bottom: 4px;
      border-radius: 4px;
      font-size: 13px;
      color: var(--text-1);
      cursor: pointer;
      transition: all 0.2s;
    }

    .sidebar-item:hover {
      background-color: var(--bg-3);
      color: var(--text-0);
    }

    .sidebar-item.active {
      background-color: var(--bg-3);
      color: var(--accent);
      font-weight: 500;
    }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      background-color: var(--bg-1);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-0);
    }

    .header-subtitle {
      font-size: 13px;
      color: var(--text-2);
      margin-left: 8px;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 32px;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      max-width: 1400px;
    }

    .menu-section {
      background-color: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px;
    }

    .menu-section-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-0);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .menu-items-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .menu-item {
      background-color: var(--bg-3);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .drag-handle {
      cursor: grab;
      color: var(--text-2);
      font-size: 18px;
      padding-top: 4px;
      flex-shrink: 0;
    }

    .drag-handle:active {
      cursor: grabbing;
    }

    .menu-item-content {
      flex: 1;
    }

    .menu-item-row {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
    }

    .menu-item-row.full {
      flex-direction: column;
    }

    .input-group {
      flex: 1;
    }

    .input-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-1);
      margin-bottom: 6px;
      display: block;
    }

    input[type="text"],
    textarea,
    select {
      width: 100%;
      background-color: var(--bg-1);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-0);
      padding: 8px 12px;
      font-size: 13px;
      font-family: 'Fira Sans', sans-serif;
    }

    input[type="text"]:focus,
    textarea:focus,
    select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: inset 0 0 0 1px var(--accent);
    }

    .checkbox-wrapper {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: var(--accent);
    }

    .checkbox-label {
      font-size: 13px;
      color: var(--text-1);
      cursor: pointer;
    }

    .menu-item-actions {
      display: flex;
      gap: 8px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .btn-small {
      background-color: var(--bg-1);
      border: 1px solid var(--border);
      color: var(--text-1);
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-small:hover {
      background-color: var(--bg-4);
      color: var(--text-0);
      border-color: var(--text-2);
    }

    .btn-primary {
      background-color: var(--accent);
      border: 1px solid var(--accent);
      color: white;
      padding: 8px 16px;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary:hover {
      background-color: #b91c1c;
    }

    .add-button {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 20px;
    }

    .add-icon {
      width: 20px;
      height: 20px;
      background-color: var(--accent);
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 14px;
      font-weight: bold;
    }

    .nested-items {
      margin-left: 24px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .nested-item {
      background-color: var(--bg-1);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 12px;
      margin-bottom: 8px;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .nested-item-content {
      flex: 1;
    }

    .nested-item input {
      font-size: 12px;
      padding: 6px 10px;
    }

    .columns-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .column-item {
      background-color: var(--bg-3);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .column-content {
      flex: 1;
    }

    .column-links {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .column-link {
      background-color: var(--bg-1);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 8px 10px;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .column-link input {
      font-size: 12px;
      padding: 4px 8px;
    }

    .remove-btn {
      background: none;
      border: none;
      color: var(--text-2);
      cursor: pointer;
      padding: 4px;
      font-size: 16px;
      transition: color 0.2s;
    }

    .remove-btn:hover {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">S</div>
        <div class="sidebar-brand">SmartCounter</div>
      </div>
      <div class="sidebar-brand" style="font-size: 10px; color: var(--text-2); margin-bottom: 32px;">ADMIN</div>

      <div class="sidebar-section">
        <div class="sidebar-section-title">Collections</div>
        <div class="sidebar-item active">Navigation</div>
        <div class="sidebar-item">Posts</div>
        <div class="sidebar-item">Users</div>
        <div class="sidebar-item">Settings</div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-section-title">Globals</div>
        <div class="sidebar-item">Homepage Config</div>
        <div class="sidebar-item">Site Settings</div>
      </div>
    </div>

    <div class="main-content">
      <div class="header">
        <div>
          <div class="header-title">Navigation Menu Builder</div>
          <div class="header-subtitle">Edit main menu and footer navigation</div>
        </div>
      </div>

      <div class="content">
        <div class="menu-grid">
          <!-- Main Menu Section -->
          <div class="menu-section">
            <div class="menu-section-title">
              <span>Main Menu</span>
            </div>
            <div class="menu-items-list">
              <!-- Menu Item 1 -->
              <div class="menu-item">
                <div class="drag-handle">⋮⋮</div>
                <div class="menu-item-content">
                  <div class="menu-item-row">
                    <div class="input-group">
                      <label class="input-label">Label</label>
                      <input type="text" value="Features">
                    </div>
                    <div class="input-group">
                      <label class="input-label">Link</label>
                      <input type="text" value="/features">
                    </div>
                  </div>
                  <div class="checkbox-wrapper">
                    <input type="checkbox" id="open-new-1">
                    <label for="open-new-1" class="checkbox-label">Open in new tab</label>
                  </div>
                </div>
              </div>

              <!-- Menu Item 2 -->
              <div class="menu-item">
                <div class="drag-handle">⋮⋮</div>
                <div class="menu-item-content">
                  <div class="menu-item-row">
                    <div class="input-group">
                      <label class="input-label">Label</label>
                      <input type="text" value="Use Cases">
                    </div>
                    <div class="input-group">
                      <label class="input-label">Link</label>
                      <input type="text" value="/use-cases">
                    </div>
                  </div>
                  <div class="checkbox-wrapper">
                    <input type="checkbox" id="open-new-2">
                    <label for="open-new-2" class="checkbox-label">Open in new tab</label>
                  </div>
                </div>
              </div>

              <!-- Menu Item 3 -->
              <div class="menu-item">
                <div class="drag-handle">⋮⋮</div>
                <div class="menu-item-content">
                  <div class="menu-item-row">
                    <div class="input-group">
                      <label class="input-label">Label</label>
                      <input type="text" value="Packages">
                    </div>
                    <div class="input-group">
                      <label class="input-label">Link</label>
                      <input type="text" value="/packages">
                    </div>
                  </div>
                  <div class="checkbox-wrapper">
                    <input type="checkbox" id="open-new-3">
                    <label for="open-new-3" class="checkbox-label">Open in new tab</label>
                  </div>
                </div>
              </div>

              <!-- Menu Item 4 -->
              <div class="menu-item">
                <div class="drag-handle">⋮⋮</div>
                <div class="menu-item-content">
                  <div class="menu-item-row">
                    <div class="input-group">
                      <label class="input-label">Label</label>
                      <input type="text" value="FAQ">
                    </div>
                    <div class="input-group">
                      <label class="input-label">Link</label>
                      <input type="text" value="/faq">
                    </div>
                  </div>
                  <div class="checkbox-wrapper">
                    <input type="checkbox" id="open-new-4">
                    <label for="open-new-4" class="checkbox-label">Open in new tab</label>
                  </div>
                </div>
              </div>

              <!-- Menu Item 5 -->
              <div class="menu-item">
                <div class="drag-handle">⋮⋮</div>
                <div class="menu-item-content">
                  <div class="menu-item-row">
                    <div class="input-group">
                      <label class="input-label">Label</label>
                      <input type="text" value="Blog">
                    </div>
                    <div class="input-group">
                      <label class="input-label">Link</label>
                      <input type="text" value="/blog">
                    </div>
                  </div>
                  <div class="checkbox-wrapper">
                    <input type="checkbox" id="open-new-5">
                    <label for="open-new-5" class="checkbox-label">Open in new tab</label>
                  </div>
                </div>
              </div>

              <!-- Menu Item 6 -->
              <div class="menu-item">
                <div class="drag-handle">⋮⋮</div>
                <div class="menu-item-content">
                  <div class="menu-item-row">
                    <div class="input-group">
                      <label class="input-label">Label</label>
                      <input type="text" value="Contact Us">
                    </div>
                    <div class="input-group">
                      <label class="input-label">Link</label>
                      <input type="text" value="/contact">
                    </div>
                  </div>
                  <div class="checkbox-wrapper">
                    <input type="checkbox" id="open-new-6">
                    <label for="open-new-6" class="checkbox-label">Open in new tab</label>
                  </div>
                </div>
              </div>
            </div>
            <div class="add-button">
              <button class="btn-primary" style="width: 100%;">Add Item</button>
            </div>
          </div>

          <!-- Footer Menu Section -->
          <div class="menu-section">
            <div class="menu-section-title">
              <span>Footer Menu</span>
            </div>
            <div class="columns-grid">
              <!-- Column 1 -->
              <div class="column-item">
                <div class="drag-handle">⋮⋮</div>
                <div class="column-content">
                  <div class="input-group">
                    <label class="input-label">Column Title</label>
                    <input type="text" value="Products">
                  </div>
                  <div class="column-links">
                    <div class="column-link">
                      <input type="text" value="Features" style="flex: 1;">
                      <button class="remove-btn">×</button>
                    </div>
                    <div class="column-link">
                      <input type="text" value="Packages" style="flex: 1;">
                      <button class="remove-btn">×</button>
                    </div>
                    <div class="column-link">
                      <input type="text" value="Use Cases" style="flex: 1;">
                      <button class="remove-btn">×</button>
                    </div>
                    <div class="column-link">
                      <input type="text" value="Demo" style="flex: 1;">
                      <button class="remove-btn">×</button>
                    </div>
                  </div>
                  <button class="btn-small" style="margin-top: 12px;">Add Link</button>
                </div>
              </div>

              <!-- Column 2 -->
              <div class="column-item">
                <div class="drag-handle">⋮⋮</div>
                <div class="column-content">
                  <div class="input-group">
                    <label class="input-label">Column Title</label>
                    <input type="text" value="Resources">
                  </div>
                  <div class="column-links">
                    <div class="column-link">
                      <input type="text" value="Blog" style="flex: 1;">
                      <button class="remove-btn">×</button>
                    </div>
                    <div class="column-link">
                      <input type="text" value="FAQ" style="flex: 1;">
                      <button class="remove-btn">×</button>
                    </div>
                    <div class="column-link">
                      <input type="text" value="Contact" style="flex: 1;">
                      <button class="remove-btn">×</button>
                    </div>
                  </div>
                  <button class="btn-small" style="margin-top: 12px;">Add Link</button>
                </div>
              </div>

              <!-- Column 3 -->
              <div class="column-item">
                <div class="drag-handle">⋮⋮</div>
                <div class="column-content">
                  <div class="input-group">
                    <label class="input-label">Column Title</label>
                    <input type="text" value="Contact">
                  </div>
                  <div class="column-links">
                    <div class="column-link">
                      <input type="text" value="sales@smartcounter.io" style="flex: 1;">
                      <button class="remove-btn">×</button>
                    </div>
                    <div class="column-link">
                      <input type="text" value="+1 (555) 123-4567" style="flex: 1;">
                      <button class="remove-btn">×</button>
                    </div>
                    <div class="column-link">
                      <input type="text" value="Jakarta, Indonesia" style="flex: 1;">
                      <button class="remove-btn">×</button>
                    </div>
                  </div>
                  <button class="btn-small" style="margin-top: 12px;">Add Link</button>
                </div>
              </div>
            </div>
            <div class="add-button">
              <button class="btn-primary" style="width: 100%;">Add Column</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
